{{ define "main" }}
<div class="home">
  {{ if .Content }}<div class="page-content">{{ .Content }}</div>{{ end }}
  <ul class="post-list">
    {{ range where .Site.RegularPages "Type" "posts" }}
    <li>
      <span class="post-meta">{{ .Date.Format "Jan 2, 2006" }}</span>
      <h3>
        <a class="post-link" href="{{ .Permalink }}">{{ .Title }}</a>
      </h3>
      {{ with .Summary }}<p>{{ . }}</p>{{ end }}
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
